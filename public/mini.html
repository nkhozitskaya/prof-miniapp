<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Профориентация</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0f172a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { text-align: center; padding: 1.5rem; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="box" id="splash">
    <h1>Профориентация</h1>
    <p id="status">Загрузка...</p>
  </div>
  <iframe id="app" src="/" style="position:fixed;inset:0;width:100%;height:100%;border:0;display:none;"></iframe>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function() {
      var splash = document.getElementById('splash');
      var app = document.getElementById('app');
      var status = document.getElementById('status');
      try {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
        }
        status.textContent = 'Загрузка приложения...';
        app.onload = function() {
          splash.style.display = 'none';
          app.style.display = 'block';
        };
        setTimeout(function() {
          if (splash.style.display !== 'none') {
            status.textContent = 'Приложение загружено. Если экран пустой — обновите.';
            app.style.display = 'block';
            splash.style.display = 'none';
          }
        }, 8000);
      } catch (e) {
        status.textContent = 'Ошибка: ' + (e.message || 'unknown');
      }
    })();
  </script>
</body>
</html>
