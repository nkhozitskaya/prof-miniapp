# Конфиг Supabase CLI. project_ref подставится при выполнении supabase link.

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322

# Секреты Edge Functions: Dashboard → Secrets или supabase secrets set
#
# verify_jwt = false: шлюз не требует JWT Supabase Auth. У нас свой Bearer-токен в diagnostic;
# telegram-auth и phone-auth — без заголовка Authorization.

[functions.telegram-auth]
verify_jwt = false

[functions.phone-auth]
verify_jwt = false

[functions.diagnostic]
verify_jwt = false
